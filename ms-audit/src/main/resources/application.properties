server.port=8088
spring.application.name=ms-audit

spring.datasource.url=jdbc:oracle:thin:@localhost:1522/FREE
spring.datasource.username=SYSTEM
spring.datasource.password=Admin12345*
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=false
spring.flyway.validate-on-migrate=false

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=sgf-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.properties.max.block.ms=1500

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.security.user.name=admin
spring.security.user.password=admin123