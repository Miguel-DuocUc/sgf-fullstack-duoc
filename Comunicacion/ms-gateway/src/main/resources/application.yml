server:
  port: 8080

spring:
  application:
    name: ms-gateway

  cloud:
    gateway:
      routes:
        # ==========================================
        # RUTAS DE NEGOCIO (APIs reales)
        # ==========================================
        - id: ms-auth-route
          uri: lb://ms-auth
          predicates:
            - Path=/api/v1/auth/**

        - id: ms-logistics-route
          uri: lb://ms-logistics
          predicates:
            - Path=/api/v1/logistics/**

        - id: ms-users-route
          uri: lb://ms-users
          predicates:
            - Path=/api/v1/users/**

        - id: ms-bordercontrol-route
          uri: lb://ms-bordercontrol
          predicates:
            - Path=/api/v1/border-control/**

        - id: ms-visa-route
          uri: lb://ms-visa
          predicates:
            - Path=/api/v1/visas/**

        - id: ms-identity-route
          uri: lb://ms-identity
          predicates:
            - Path=/api/v1/identity/**

        - id: ms-health-route
          uri: lb://ms-health
          predicates:
            - Path=/api/v1/health/**

        - id: ms-alerts-route
          uri: lb://ms-alerts
          predicates:
            - Path=/api/v1/alerts/**

        - id: ms-audit-route
          uri: lb://ms-audit
          predicates:
            - Path=/api/v1/audit/**

        # ==========================================
        # RUTAS DE SWAGGER (Recolección de JSON)
        # ==========================================
        - id: ms-auth-docs-route
          uri: lb://ms-auth
          predicates:
            - Path=/docs/ms-auth/**
          filters:
            - RewritePath=/docs/ms-auth/(?<segment>.*), /$\{segment}

        - id: ms-logistics-docs-route
          uri: lb://ms-logistics
          predicates:
            - Path=/docs/ms-logistics/**
          filters:
            - RewritePath=/docs/ms-logistics/(?<segment>.*), /$\{segment}

        - id: ms-users-docs-route
          uri: lb://ms-users
          predicates:
            - Path=/docs/ms-users/**
          filters:
            - RewritePath=/docs/ms-users/(?<segment>.*), /$\{segment}

        - id: ms-bordercontrol-docs-route
          uri: lb://ms-bordercontrol
          predicates:
            - Path=/docs/ms-bordercontrol/**
          filters:
            - RewritePath=/docs/ms-bordercontrol/(?<segment>.*), /$\{segment}

        - id: ms-visa-docs-route
          uri: lb://ms-visa
          predicates:
            - Path=/docs/ms-visa/**
          filters:
            - RewritePath=/docs/ms-visa/(?<segment>.*), /$\{segment}

        - id: ms-identity-docs-route
          uri: lb://ms-identity
          predicates:
            - Path=/docs/ms-identity/**
          filters:
            - RewritePath=/docs/ms-identity/(?<segment>.*), /$\{segment}

        - id: ms-health-docs-route
          uri: lb://ms-health
          predicates:
            - Path=/docs/ms-health/**
          filters:
            - RewritePath=/docs/ms-health/(?<segment>.*), /$\{segment}

        - id: ms-alerts-docs-route
          uri: lb://ms-alerts
          predicates:
            - Path=/docs/ms-alerts/**
          filters:
            - RewritePath=/docs/ms-alerts/(?<segment>.*), /$\{segment}

        - id: ms-audit-docs-route
          uri: lb://ms-audit
          predicates:
            - Path=/docs/ms-audit/**
          filters:
            - RewritePath=/docs/ms-audit/(?<segment>.*), /$\{segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

global:
  operator:
    os:
      jwt:
        secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
        expiration: ${JWT_EXPIRATION:86400000}

# ==========================================
# CONFIGURACIÓN UI DE SWAGGER (Dropdown Menu)
# ==========================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Autenticación (ms-auth)
        url: /docs/ms-auth/v3/api-docs
      - name: Logística (ms-logistics)
        url: /docs/ms-logistics/v3/api-docs
      - name: Usuarios (ms-users)
        url: /docs/ms-users/v3/api-docs
      - name: Control Fronterizo (ms-bordercontrol)
        url: /docs/ms-bordercontrol/v3/api-docs
      - name: Visas (ms-visa)
        url: /docs/ms-visa/v3/api-docs
      - name: Identidad (ms-identity)
        url: /docs/ms-identity/v3/api-docs
      - name: Salud (ms-health)
        url: /docs/ms-health/v3/api-docs
      - name: Alertas (ms-alerts)
        url: /docs/ms-alerts/v3/api-docs
      - name: Auditoría (ms-audit)
        url: /docs/ms-audit/v3/api-docs