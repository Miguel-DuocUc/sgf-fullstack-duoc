spring.application.name=ms-bordercontrol
server.port=8084

spring.datasource.url=jdbc:oracle:thin:@localhost:1524/FREE
spring.datasource.username=SYSTEM
spring.datasource.password=Admin12345*
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

clients.ms-users.url=http://localhost:8083
clients.ms-identity.url=http://localhost:8086
clients.ms-visa.url=http://localhost:8085
clients.ms-health.url=http://localhost:8087

spring.kafka.bootstrap-servers=localhost:9092

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.flyway.enabled=false

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer