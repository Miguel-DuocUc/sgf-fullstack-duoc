spring.application.name=ms-health
server.port=8087

# ==========================================
# 1. BASE DE DATOS (Parametrizada)
# ==========================================
spring.datasource.url=jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}/FREE
spring.datasource.username=${DB_USER:ms_health}
spring.datasource.password=${DB_PASS:Admin12345}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 2. COMUNICACIÓN ENTRE MICROSERVICIOS
# ==========================================
clients.ms-users.url=${MS_USERS_URL:http://ms-users}
clients.ms-identity.url=${MS_IDENTITY_URL:http://ms-identity}

# ==========================================
# 3. EUREKA
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.port=8087

# ==========================================
# 4. MIGRACIONES
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs