server:
  port: 8080

spring:
  application:
    name: ms-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: ms-auth-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**

            - id: ms-logistics-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/logistics/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    register-with-eureka: true
    fetch-registry: true