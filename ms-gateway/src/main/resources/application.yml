server:
  port: 8080

spring:
  application:
    name: ms-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: ms-auth-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
                -
            - id: ms-logistics-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/logistics/**
                -
            - id: ms-users-route
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/users/**
                -
            - id: ms-bordercontrol-route
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/border-control/**
                -
            - id: ms-visa-route
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/visas/**
                -
            - id: ms-identity-route
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/identity/**
                -
            - id: ms-health-route
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/health/**
                -
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    register-with-eureka: true
    fetch-registry: true

global:
  operator:
    os:
      jwt:
