spring.application.name=ms-auth
server.port=8081

# ==========================================
# 1. BASE DE DATOS
# ==========================================
spring.datasource.url=jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}/FREE
spring.datasource.username=${DB_USER:ms_auth}
spring.datasource.password=${DB_PASS:Admin12345}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ==========================================
# 2. EUREKA
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# 3. MIGRACIONES
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# ==========================================
# 4. SEGURIDAD JWT
# ==========================================
global.operator.os.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
global.operator.os.jwt.expiration=${JWT_EXPIRATION:86400000}